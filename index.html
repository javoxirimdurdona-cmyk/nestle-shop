<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Nestle.uz</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #241213;
    --bg: #FBF3EE;
    --card: #FFFFFF;
    --primary: #C81D2A;
    --primary-dark: #9A1520;
    --accent: #F5A623;
    --muted: #9B8783;
    --line: #F0DFD8;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    padding-bottom: 148px;
  }
  h1, h2, h3, .display { font-family: 'Fraunces', serif; }

  header.top {
    padding: 18px 16px 44px;
    background: var(--primary);
    color: white;
    border-radius: 0 0 26px 26px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header.top .logo {
    width: 46px; height: 46px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    background: white;
    display: flex; align-items: center; justify-content: center;
  }
  header.top .logo img { width: 100%; height: 100%; object-fit: cover; }
  header.top .brand { font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
  header.top .sub { font-size: 12.5px; opacity: 0.85; margin-top: 2px; }

  .crumbs {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 12px 16px 4px;
    font-size: 13px;
    color: var(--muted);
    flex-wrap: wrap;
    margin-top: -26px;
  }
  .crumbs button {
    background: var(--card);
    border: 1px solid var(--line);
    color: var(--primary-dark);
    font-weight: 600;
    font-size: 12.5px;
    padding: 6px 12px;
    border-radius: 999px;
    cursor: pointer;
  }
  .crumbs span.sep { color: var(--muted); }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 14px 16px 16px;
  }
  .grid.single { grid-template-columns: 1fr; }

  .tile {
    background: var(--card);
    border-radius: 18px;
    padding: 16px;
    border: 1px solid var(--line);
    cursor: pointer;
    transition: transform .12s ease;
    display: flex;
    flex-direction: column;
    gap: 8px;
    box-shadow: 0 2px 10px rgba(200,29,42,0.06);
  }
  .tile:active { transform: scale(0.97); }
  .tile .icon {
    width: 46px; height: 46px;
    border-radius: 13px;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .tile .name { font-weight: 700; font-size: 15px; }
  .tile .meta { font-size: 12.5px; color: var(--muted); }

  .product-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 12px;
    box-shadow: 0 2px 10px rgba(200,29,42,0.06);
  }
  .product-row .icon {
    width: 54px; height: 54px; border-radius: 14px;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; flex-shrink: 0;
  }
  .product-row .info { flex: 1; }
  .product-row .name { font-weight: 700; font-size: 14.5px; }
  .product-row .price { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .product-row .price.set { color: var(--primary-dark); font-weight: 700; }
  .add-btn {
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 11px;
    width: 36px; height: 36px;
    font-size: 19px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .qty-stepper {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .qty-stepper button {
    width: 28px; height: 28px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--bg);
    font-size: 16px;
    cursor: pointer;
  }
  .qty-stepper .n { min-width: 18px; text-align: center; font-weight: 700; font-size: 14px; }

  nav.bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--card);
    border-top: 1px solid var(--line);
    display: flex;
    padding: 10px 8px calc(10px + env(safe-area-inset-bottom));
    z-index: 50;
  }
  nav.bottom-nav .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    position: relative;
  }
  nav.bottom-nav .nav-btn.active { color: var(--primary); }
  nav.bottom-nav .nav-btn .ic { font-size: 20px; }
  nav.bottom-nav .badge {
    position: absolute;
    top: -2px; right: 24%;
    background: var(--primary);
    color: white;
    border-radius: 999px;
    font-size: 10px;
    min-width: 15px;
    height: 15px;
    display: flex; align-items: center; justify-content: center;
    padding: 0 3px;
  }

  .cart-bar {
    position: fixed;
    bottom: 78px; left: 16px; right: 16px;
    background: var(--primary);
    color: white;
    border-radius: 16px;
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 8px 20px rgba(200,29,42,0.35);
    cursor: pointer;
    font-weight: 700;
    z-index: 40;
  }
  .cart-bar .count {
    background: rgba(255,255,255,0.25);
    border-radius: 999px;
    padding: 2px 9px;
    font-size: 13px;
    margin-right: 8px;
  }

  .sheet-overlay {
    position: fixed; inset: 0;
    background: rgba(36,18,19,0.45);
    display: none;
    align-items: flex-end;
    z-index: 100;
  }
  .sheet-overlay.open { display: flex; }
  .sheet {
    background: var(--bg);
    width: 100%;
    max-height: 82vh;
    overflow-y: auto;
    border-radius: 22px 22px 0 0;
    padding: 18px 16px 24px;
  }
  .sheet-handle {
    width: 40px; height: 4px;
    background: var(--line);
    border-radius: 4px;
    margin: 0 auto 14px;
  }
  .sheet h2 { margin: 0 0 12px; font-size: 20px; }

  .cart-item {
    background: var(--card);
    border-radius: 14px;
    padding: 12px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .cart-item .name { font-weight: 700; font-size: 14px; }
  .cart-item .sub { font-size: 12.5px; color: var(--muted); margin-top: 2px; }

  .total-row {
    display: flex; justify-content: space-between;
    font-weight: 700; font-size: 16px;
    padding: 14px 4px 6px;
  }

  input, textarea {
    width: 100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid var(--line);
    font-family: 'Inter', sans-serif;
    font-size: 14.5px;
    margin-bottom: 10px;
    background: var(--card);
  }
  label.field-label {
    font-size: 12.5px;
    color: var(--muted);
    font-weight: 600;
    margin: 4px 2px 4px;
    display: block;
  }

  .primary-btn {
    width: 100%;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 15px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 6px;
  }
  .primary-btn:disabled { opacity: 0.5; }

  .empty-note {
    text-align: center;
    color: var(--muted);
    font-size: 13.5px;
    padding: 40px 20px;
  }

  .confirm-screen {
    text-align: center;
    padding: 60px 24px;
  }
  .confirm-screen .mark {
    width: 64px; height: 64px;
    background: var(--primary);
    color: white;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 30px;
    margin: 0 auto 18px;
  }

  .order-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 14px;
    margin: 0 16px 12px;
  }
  .order-card .head { display: flex; justify-content: space-between; font-size: 12.5px; color: var(--muted); margin-bottom: 6px; }
  .order-card .head .status { color: var(--primary-dark); font-weight: 700; }
</style>
</head>
<body>

<header class="top">
  <div class="logo"><img src="assets/logo.png" alt="Nestle.uz"></div>
  <div>
    <div class="brand">Nestle.uz</div>
    <div class="sub">91 312 55 45 · Bolalar ozuqasi va shirinliklar</div>
  </div>
</header>

<div class="crumbs" id="crumbs"></div>
<div id="content"></div>

<div class="cart-bar" id="cartBar" style="display:none;" onclick="openCart()">
  <span><span class="count" id="cartCount">0</span>Savat</span>
  <span id="cartTotal">0 so'm</span>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" id="navHome" onclick="goHome()">
    <span class="ic">🏠</span>Bosh sahifa
  </button>
  <button class="nav-btn" id="navCart" onclick="openCart()">
    <span class="ic">🛒</span>Savat
    <span class="badge" id="navCartBadge" style="display:none;">0</span>
  </button>
  <button class="nav-btn" id="navOrders" onclick="showOrders()">
    <span class="ic">📋</span>Buyurtmalar
  </button>
</nav>

<div class="sheet-overlay" id="cartOverlay" onclick="if(event.target===this) closeCart()">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2>Savatingiz</h2>
    <div id="cartItems"></div>
    <div class="total-row"><span>Jami</span><span id="cartSheetTotal">0 so'm</span></div>
    <button class="primary-btn" id="checkoutBtn" onclick="showCheckout()">Buyurtma berish</button>
  </div>
</div>

<div class="sheet-overlay" id="checkoutOverlay" onclick="if(event.target===this) closeCheckout()">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2>Ma'lumotlaringiz</h2>
    <label class="field-label">Ismingiz</label>
    <input id="custName" placeholder="Ismingiz">
    <label class="field-label">Telefon raqam</label>
    <input id="custPhone" placeholder="+998901234567">
    <label class="field-label">Yetkazib berish manzili</label>
    <textarea id="custAddress" rows="3" placeholder="Manzilingiz"></textarea>
    <button class="primary-btn" onclick="submitOrder()">Buyurtmani tasdiqlash</button>
  </div>
</div>

<script>
const CATALOG = {
  baby: {
    name: "Bolalar ozuqasi", icon: "🍼",
    children: {
      nan: {
        name: "Nan", iconImg: "assets/nan_logo.png",
        children: {
          nan1: { name: "Nan 1", icon: "1️⃣", products: {
            nan1_400: { name: "Nan 1 400gr", unit: "dona", price: 113000 },
            nan1_800: { name: "Nan 1 800gr", unit: "dona", price: 0 },
            nan1_1200: { name: "Nan 1 1200gr", unit: "dona", price: 0 },
          }},
          nan2: { name: "Nan 2", icon: "2️⃣", products: {
            nan2_400: { name: "Nan 2 400gr", unit: "dona", price: 0 },
            nan2_800: { name: "Nan 2 800gr", unit: "dona", price: 0 },
            nan2_1200: { name: "Nan 2 1200gr", unit: "dona", price: 0 },
          }},
          nan3: { name: "Nan 3", icon: "3️⃣", products: {
            nan3_400: { name: "Nan 3 400gr", unit: "dona", price: 0 },
            nan3_800: { name: "Nan 3 800gr", unit: "dona", price: 0 },
            nan3_1200: { name: "Nan 3 1200gr", unit: "dona", price: 0 },
          }},
          nan4: { name: "Nan 4", icon: "4️⃣", products: {
            nan4_400: { name: "Nan 4 400gr", unit: "dona", price: 0 },
            nan4_800: { name: "Nan 4 800gr", unit: "dona", price: 0 },
            nan4_1200: { name: "Nan 4 1200gr", unit: "dona", price: 0 },
          }},
        }
      },
      nestogen: {
        name: "Nestogen", iconImg: "assets/nestogen_logo.png",
        children: {
          nestogen1: { name: "Nestogen 1", icon: "1️⃣", products: {
            nestogen1_400: { name: "Nestogen 1 400gr", unit: "dona", price: 0 },
            nestogen1_800: { name: "Nestogen 1 800gr", unit: "dona", price: 0 },
            nestogen1_1200: { name: "Nestogen 1 1200gr", unit: "dona", price: 0 },
          }},
          nestogen2: { name: "Nestogen 2", icon: "2️⃣", products: {
            nestogen2_400: { name: "Nestogen 2 400gr", unit: "dona", price: 0 },
            nestogen2_800: { name: "Nestogen 2 800gr", unit: "dona", price: 0 },
            nestogen2_1200: { name: "Nestogen 2 1200gr", unit: "dona", price: 0 },
          }},
          nestogen3: { name: "Nestogen 3", icon: "3️⃣", products: {
            nestogen3_400: { name: "Nestogen 3 400gr", unit: "dona", price: 0 },
            nestogen3_800: { name: "Nestogen 3 800gr", unit: "dona", price: 0 },
            nestogen3_1200: { name: "Nestogen 3 1200gr", unit: "dona", price: 0 },
          }},
          nestogen4: { name: "Nestogen 4", icon: "4️⃣", products: {
            nestogen4_400: { name: "Nestogen 4 400gr", unit: "dona", price: 0 },
            nestogen4_800: { name: "Nestogen 4 800gr", unit: "dona", price: 0 },
            nestogen4_1200: { name: "Nestogen 4 1200gr", unit: "dona", price: 0 },
          }},
        }
      },
    }
  },
  sweets: {
    name: "Shirinliklar", icon: "🍫",
    products: {
      chocolate: { name: "Kilogramm shokolad", unit: "kg", price: 0 },
    }
  },
};

let path = [];
let cart = [];
let orders = [];
let view = 'catalog';

const tg = window.Telegram ? window.Telegram.WebApp : null;
if (tg) { tg.ready(); tg.expand(); }

function getNode(p) {
  let node = { children: CATALOG };
  for (const code of p) node = (node.children || {})[code];
  return node;
}

function fmt(n) {
  return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
}

function goHome() {
  view = 'catalog';
  path = [];
  document.getElementById('navHome').classList.add('active');
  document.getElementById('navOrders').classList.remove('active');
  render();
}

function render() {
  const node = getNode(path);
  const content = document.getElementById('content');
  const crumbs = document.getElementById('crumbs');

  crumbs.innerHTML = '';
  const rootBtn = document.createElement('button');
  rootBtn.textContent = 'Katalog';
  rootBtn.onclick = () => { path = []; render(); };
  crumbs.appendChild(rootBtn);
  let acc = [];
  for (const code of path) {
    acc.push(code);
    const n = getNode(acc);
    const sep = document.createElement('span');
    sep.className = 'sep';
    sep.textContent = ' / ';
    crumbs.appendChild(sep);
    const b = document.createElement('button');
    b.textContent = n.name;
    const target = [...acc];
    b.onclick = () => { path = target; render(); };
    crumbs.appendChild(b);
  }

  content.innerHTML = '';

  const children = node.children || {};
  const products = node.products || {};

  if (Object.keys(children).length) {
    const grid = document.createElement('div');
    grid.className = 'grid';
    for (const [code, child] of Object.entries(children)) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.onclick = () => { path = [...path, code]; render(); };
      const countInfo = child.products ? `${Object.keys(child.products).length} ta mahsulot` : 'Kategoriya';
      const iconHtml = child.iconImg
        ? `<img src="${child.iconImg}" alt="${child.name}" style="width:100%;height:100%;object-fit:contain;">`
        : (child.icon || '📁');
      tile.innerHTML = `<div class="icon">${iconHtml}</div><div class="name">${child.name}</div><div class="meta">${countInfo}</div>`;
      grid.appendChild(tile);
    }
    content.appendChild(grid);
  }

  if (Object.keys(products).length) {
    const wrap = document.createElement('div');
    wrap.className = 'grid single';
    for (const [code, product] of Object.entries(products)) {
      const row = document.createElement('div');
      row.className = 'product-row';
      const priceLabel = product.price ? `${fmt(product.price)} so'm / ${product.unit}` : `Narx kelishiladi`;
      row.innerHTML = `
        <div class="icon">🧴</div>
        <div class="info">
          <div class="name">${product.name}</div>
          <div class="price ${product.price ? 'set' : ''}">${priceLabel}</div>
        </div>
        <button class="add-btn" data-code="${code}">+</button>
      `;
      row.querySelector('.add-btn').onclick = () => addToCart(code, product);
      wrap.appendChild(row);
    }
    content.appendChild(wrap);
  }

  if (!Object.keys(children).length && !Object.keys(products).length) {
    content.innerHTML = '<div class="empty-note">Bu yerda hozircha mahsulot yo\'q</div>';
  }

  updateCartBar();
}

function addToCart(code, product) {
  const existing = cart.find(i => i.code === code);
  if (existing) { existing.qty += 1; }
  else { cart.push({ code, name: product.name, unit: product.unit, price: product.price, qty: 1 }); }
  updateCartBar();
}

function cartTotal() {
  return cart.reduce((sum, i) => sum + (i.price || 0) * i.qty, 0);
}

function updateCartBar() {
  const bar = document.getElementById('cartBar');
  const count = cart.reduce((s, i) => s + i.qty, 0);
  const badge = document.getElementById('navCartBadge');
  if (count === 0) {
    bar.style.display = 'none';
    badge.style.display = 'none';
    return;
  }
  bar.style.display = view === 'catalog' ? 'flex' : 'none';
  badge.style.display = 'flex';
  badge.textContent = count;
  document.getElementById('cartCount').textContent = count;
  document.getElementById('cartTotal').textContent = fmt(cartTotal()) + " so'm";
}

function openCart() {
  const itemsEl = document.getElementById('cartItems');
  itemsEl.innerHTML = '';
  if (!cart.length) {
    itemsEl.innerHTML = '<div class="empty-note">Savat bo\'sh</div>';
  }
  cart.forEach((item, idx) => {
    const row = document.createElement('div');
    row.className = 'cart-item';
    row.innerHTML = `
      <div>
        <div class="name">${item.name}</div>
        <div class="sub">${item.price ? fmt(item.price) + " so'm x " : ''}${item.qty} ${item.unit}</div>
      </div>
      <div class="qty-stepper">
        <button data-act="minus">−</button>
        <span class="n">${item.qty}</span>
        <button data-act="plus">+</button>
      </div>
    `;
    row.querySelector('[data-act="minus"]').onclick = () => changeQty(idx, -1);
    row.querySelector('[data-act="plus"]').onclick = () => changeQty(idx, 1);
    itemsEl.appendChild(row);
  });
  document.getElementById('cartSheetTotal').textContent = fmt(cartTotal()) + " so'm";
  document.getElementById('cartOverlay').classList.add('open');
}

function changeQty(idx, delta) {
  cart[idx].qty += delta;
  if (cart[idx].qty <= 0) cart.splice(idx, 1);
  openCart();
  updateCartBar();
}

function closeCart() { document.getElementById('cartOverlay').classList.remove('open'); }

function showCheckout() {
  if (!cart.length) return;
  document.getElementById('checkoutOverlay').classList.add('open');
}
function closeCheckout() { document.getElementById('checkoutOverlay').classList.remove('open'); }

function showOrders() {
  view = 'orders';
  document.getElementById('navHome').classList.remove('active');
  document.getElementById('navOrders').classList.add('active');
  const content = document.getElementById('content');
  document.getElementById('crumbs').innerHTML = '';
  content.innerHTML = '';
  if (!orders.length) {
    content.innerHTML = '<div class="empty-note">Hali buyurtmalaringiz yo\'q</div>';
  } else {
    orders.forEach(o => {
      const card = document.createElement('div');
      card.className = 'order-card';
      const itemsText = o.items.map(i => `${i.name} — ${i.qty} ${i.unit}`).join(', ');
      card.innerHTML = `
        <div class="head"><span>${o.time}</span><span class="status">Yuborildi</span></div>
        <div style="font-size:14px;">${itemsText}</div>
        <div style="font-weight:700; margin-top:6px;">${fmt(o.total)} so'm</div>
      `;
      content.appendChild(card);
    });
  }
  updateCartBar();
}

function submitOrder() {
  const name = document.getElementById('custName').value.trim();
  const phone = document.getElementById('custPhone').value.trim();
  const address = document.getElementById('custAddress').value.trim();
  if (!name || !phone || !address) {
    alert("Iltimos, barcha maydonlarni to'ldiring");
    return;
  }
  const order = {
    items: cart.map(i => ({ name: i.name, qty: i.qty, unit: i.unit, price: i.price })),
    total: cartTotal(),
    customer_name: name,
    phone: phone,
    address: address,
    time: new Date().toLocaleString('uz-UZ'),
  };
  orders.push(order);

  if (tg) {
    tg.sendData(JSON.stringify(order));
    tg.close();
  } else {
    closeCheckout();
    closeCart();
    cart = [];
    updateCartBar();
    document.body.innerHTML = `
      <div class="confirm-screen">
        <div class="mark">✓</div>
        <h2>Buyurtma tayyor (sinov rejimi)</h2>
        <p style="color:var(--muted)">Bu ilova Telegram ichida ochilganda, buyurtma avtomatik botga yuboriladi.</p>
      </div>`;
    console.log(order);
  }
}

render();
</script>
</body>
</html>
